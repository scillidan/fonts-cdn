name: Release

on:
  push:
    branches: [main, master]
    paths:
      - 'fonts/**'
  workflow_dispatch:
    inputs:
      font:
        description: 'Font ID (e.g. sarasa-mono-sc)'
        required: true
        type: string
      version:
        description: 'Version (leave empty to use font.json version)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (fetch + build only, no release)'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y woff2 p7zip-full

      - name: Install dependencies
        run: npm ci

      - name: Restore woff2 cache
        id: cache
        uses: actions/cache@v4
        with:
          path: fonts/**/*.woff2
          key: woff2-${{ runner.os }}-${{ hashFiles('fonts/**/font.json') }}

      - name: Fetch fonts
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          chmod +x scripts/*.sh fonts/*/fetch.sh 2>/dev/null || true
          ./scripts/fetch-all.sh

      - name: Build
        run: npm run build

      - name: Get changed fonts
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "fonts=${{ inputs.font }}" >> $GITHUB_OUTPUT
          else
            changed=$(git diff --name-only HEAD~1 HEAD | grep '^fonts/' | grep -v 'fonts/.*\.woff2$' | cut -d'/' -f2 | sort -u | tr '\n' ' ' || true)
            echo "fonts=$changed" >> $GITHUB_OUTPUT
          fi

      - name: Create releases
        if: steps.changed.outputs.fonts != '' && inputs.dry_run != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for font in ${{ steps.changed.outputs.fonts }}; do
            if [ -n "${{ inputs.version }}" ]; then
              version="${{ inputs.version }}"
            else
              version=$(node -e "console.log(require('./fonts/$font/font.json').version)")
            fi
            tag="${font}@${version}"

            if ! git tag -l | grep -q "^$tag$"; then
              echo "Creating release: $tag"

              if ! ls fonts/$font/*.woff2 >/dev/null 2>&1; then
                echo "::warning::No woff2 files found for $font, skipping release"
                continue
              fi

              git config user.name "github-actions[bot]"
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git add -f dist/ fonts/${font}/*.woff2
              git stash
              git checkout -b "release-${tag}"
              git stash pop
              git add -f dist/ fonts/${font}/*.woff2
              git commit -m "release: ${tag}" || echo "Nothing to commit"
              git tag -f "$tag"
              git push origin "$tag" --force

              cd fonts/$font
              zip -r ../../../${font}.zip *.woff2
              cd ../..
              mv dist/css/${font}.css ${font}.css
              zip -u ${font}.zip ${font}.css
              gh release create "$tag" ${font}.zip \
                --title "${font} ${version}" \
                --notes "Release ${version} of ${font}. Download and extract to use, or use jsDelivr CDN."
              rm ${font}.zip ${font}.css
            fi
          done
