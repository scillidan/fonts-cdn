name: Release

on:
  push:
    branches: [main, master]
    paths:
      - 'fonts/active/**'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y woff2 p7zip-full
      
      - name: Install dependencies
        run: npm ci
      
      - name: Fetch fonts
        run: |
          chmod +x scripts/*.sh fonts/*/fetch.sh 2>/dev/null || true
          ./scripts/fetch-all.sh
      
      - name: Build
        run: npm run build
      
      - name: Get changed fonts
        id: changed
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD | grep 'fonts/active/' | cut -d'/' -f3 | sort -u | tr '\n' ' ' || true)
          echo "fonts=$changed" >> $GITHUB_OUTPUT
      
      - name: Create releases
        if: steps.changed.outputs.fonts != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for font in ${{ steps.changed.outputs.fonts }}; do
            version=$(node -e "console.log(require('./fonts/active/$font/font.json').version)")
            tag="${font}@${version}"
            
            if ! git tag -l | grep -q "^$tag$"; then
              echo "Creating release: $tag"
              cd fonts/active/$font
              if ! ls *.woff2 >/dev/null 2>&1; then
                echo "::warning::No woff2 files found for $font, skipping release"
                cd ../../..
                continue
              fi
              zip -r ../../../${font}.zip *.woff2
              cd ../../..
              mv dist/css/${font}.css ${font}.css
              zip -u ${font}.zip ${font}.css
              gh release create "$tag" ${font}.zip \
                --title "${font} ${version}" \
                --notes "Release ${version} of ${font}. Download and extract to use, or use jsDelivr CDN."
              rm ${font}.zip ${font}.css
            fi
          done
