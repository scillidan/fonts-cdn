name: Update Fonts

on:
  schedule:
    # Run weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      fonts:
        description: 'Specific fonts to update (space-separated, empty for all)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y woff2 jq
          npm install -g woff2
      
      - name: Make scripts executable
        run: chmod +x scripts/*.sh fonts/*/fetch.sh 2>/dev/null || true
      
      - name: Fetch fonts
        run: |
          if [ -n "${{ inputs.fonts }}" ]; then
            ./scripts/fetch-all.sh ${{ inputs.fonts }}
          else
            ./scripts/fetch-all.sh
          fi
      
      - name: Validate
        run: |
          npm ci
          npm run validate
      
      - name: Build
        run: npm run build
      
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet --exit-code; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "fonts=$(git diff --name-only | grep 'fonts/active/' | cut -d'/' -f3 | sort -u | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi
      
      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update fonts ${{ steps.changes.outputs.fonts }}"
          title: "chore: update fonts ${{ steps.changes.outputs.fonts }}"
          body: |
            Automated font update.
            
            Updated fonts: ${{ steps.changes.outputs.fonts }}
            
            Please review the changes and merge if appropriate.
          branch: auto/update-fonts
          delete-branch: true
