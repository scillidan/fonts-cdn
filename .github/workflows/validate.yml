name: Validate and Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y woff2 p7zip-full

      - name: Install dependencies
        run: npm ci

      - name: Fetch fonts
        run: |
          chmod +x scripts/*.sh fonts/*/fetch.sh 2>/dev/null || true
          ./scripts/fetch-all.sh

      - name: Validate fonts
        run: npm run validate

      - name: Build
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7
