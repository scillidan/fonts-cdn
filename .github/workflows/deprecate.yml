name: Deprecate Font

on:
  workflow_dispatch:
    inputs:
      font:
        description: 'Font ID to deprecate (e.g. sarasa-mono-sc)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  deprecate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Remove releases and tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          font="${{ inputs.font }}"
          echo "Deprecating: $font"

          tags=$(git tag -l "${font}@*")
          if [ -z "$tags" ]; then
            echo "No releases found for $font"
            exit 0
          fi

          for tag in $tags; do
            echo "Deleting release: $tag"
            gh release delete "$tag" --yes || true
            git push origin --delete "$tag" || true
          done

          echo "Done. Remember to set deprecated: true in fonts/$font/font.json"
